[pytest]
minversion = 8.0
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -ra
    --strict-markers
    --strict-config
    --tb=short
markers =
    integration: requires real services (Orchestrator, LLM)
    eval: LLM quality evaluation tests (slow, costs money)
    slow: takes > 5s
    requires_outlook: needs Actionable Messages sender setup
    requires_salesforce: needs Salesforce sandbox
filterwarnings =
    error
    ignore::DeprecationWarning:pydantic.*
    ignore::DeprecationWarning:botocore.*
asyncio_mode = auto
